# docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Local development stack.
#
# Usage:
#   docker compose up --build        # Start everything, rebuild images
#   docker compose up -d             # Start in background (detached)
#   docker compose down              # Stop & remove containers
#   docker compose logs -f api       # Tail logs from the api service
#   docker compose exec api bash     # Shell into the running container
#
# Services:
#   api     → Flask app on http://localhost:6000
#   nginx   → Reverse proxy on http://localhost:8080 (simulates production)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Application ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime         # Use the final production stage
    container_name: devops-demo-api
    restart: unless-stopped
    environment:
      - ENVIRONMENT=development
      - PORT=6000
      - APP_VERSION=${APP_VERSION:-1.0.0-local}
      - BUILD_TIME=${BUILD_TIME:-local}
    ports:
      - "6000:6000"           # Direct access for dev/testing
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:6000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - app-network

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  # In production, you never expose your app directly.
  # Nginx sits in front: handles SSL termination, rate limiting, static files.
  # This docker-compose simulates that production architecture locally.
  nginx:
    image: nginx:1.27-alpine
    container_name: devops-demo-nginx
    restart: unless-stopped
    ports:
      - "8080:80"               # Access the app via http://localhost
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy    # Wait until API is healthy before starting
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
