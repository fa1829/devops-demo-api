# nginx/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# Nginx as a reverse proxy in front of our Flask app.
#
# WHY A REVERSE PROXY?
# - Your Flask/gunicorn server should never be exposed directly to the internet
# - Nginx handles: connection pooling, SSL termination, rate limiting,
#   static file serving, request buffering, and security headers
# - This is the standard production architecture
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;           # Scale to number of CPU cores
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;     # Max simultaneous connections per worker
    use epoll;                   # Efficient I/O on Linux
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format — useful for debugging and monitoring
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;

    # ── Security Headers ────────────────────────────────────────────────────────
    # These headers protect against common web attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;           # Don't reveal nginx version in error pages

    # ── Upstream (our Flask app) ────────────────────────────────────────────────
    # "api" resolves to the container name in docker-compose networking
    upstream flask_app {
        server api:6000;
        keepalive 32;            # Keep connections warm (performance)
    }

    # ── Rate Limiting ────────────────────────────────────────────────────────────
    # Protect against abuse/DDoS — 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── Server Block ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Health check bypass — don't rate-limit health checks
        location /health {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            access_log off;      # Don't clutter logs with health check hits
        }

        # Main API traffic
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Custom error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 502 '{"error": "Service temporarily unavailable", "code": 502}';
            add_header Content-Type application/json;
        }
    }
}
